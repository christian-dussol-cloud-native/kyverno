apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-memory-limits
  labels:
    app.kubernetes.io/managed-by: kyverno
    kyverno.io/policy-type: validate
  annotations:
    policies.kyverno.io/title: Require Memory Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Memory limits are required on all containers to prevent
      OOM kills and ensure predictable resource allocation.
      CPU limits are intentionally not required, allowing
      containers to burst above their request up to available
      node capacity (Burstable QoS class).
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-memory-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Container '{{ element.name }}' in Pod
          '{{ request.object.metadata.name }}' is missing
          required memory limits. Add resources.limits.memory
          to all containers.
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ element.resources.limits.memory || '' }}"
                    operator: Equals
                    value: ""
